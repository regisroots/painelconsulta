<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Erro interno do servidor</title>
    <style>
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: linear-gradient(135deg, #ff6b6b 0%, #ee5a24 100%);
            margin: 0;
            padding: 0;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            color: white;
        }
        .container {
            text-align: center;
            max-width: 600px;
            padding: 2rem;
        }
        .error-code {
            font-size: 6rem;
            font-weight: bold;
            margin: 0;
            text-shadow: 2px 2px 4px rgba(0,0,0,0.3);
        }
        .error-message {
            font-size: 1.5rem;
            margin: 1rem 0;
            opacity: 0.9;
        }
        .error-description {
            font-size: 1rem;
            margin: 2rem 0;
            opacity: 0.8;
            line-height: 1.6;
        }
        .back-button {
            display: inline-block;
            background: rgba(255,255,255,0.2);
            color: white;
            padding: 12px 24px;
            text-decoration: none;
            border-radius: 6px;
            border: 1px solid rgba(255,255,255,0.3);
            transition: all 0.3s ease;
            margin-top: 1rem;
        }
        .back-button:hover {
            background: rgba(255,255,255,0.3);
            transform: translateY(-2px);
        }
        .status-info {
            font-size: 0.9rem;
            opacity: 0.7;
            margin-top: 2rem;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1 class="error-code">5xx</h1>
        <h2 class="error-message">Erro interno do servidor</h2>
        <p class="error-description">
            Ocorreu um erro interno no servidor. Nossa equipe foi notificada e está trabalhando para resolver o problema.
            Tente novamente em alguns minutos.
        </p>
        <a href="/" class="back-button">Voltar ao início</a>
        <div class="status-info">
            Se o problema persistir, entre em contato com o suporte.
        </div>
    </div>
</body>
</html>
