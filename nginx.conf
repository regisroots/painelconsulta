# Nginx Stealth Configuration
# Completely hides nginx version and server fingerprints
# Compiled with headers-more-nginx-module for complete header manipulation

user nginx;
worker_processes auto;
error_log /var/log/nginx/error.log warn;
pid /var/run/nginx.pid;

# Optimize worker processes
worker_rlimit_nofile 65535;

events {
    worker_connections 4096;
    use epoll;
    multi_accept on;
    accept_mutex off;
}

http {
    include /etc/nginx/mime.types;
    default_type application/octet-stream;

    # STEALTH CONFIGURATION - Hide all server information
    server_tokens off;
    
    # Clear all potentially revealing headers
    more_clear_headers Server;
    more_clear_headers X-Powered-By;
    more_clear_headers X-AspNet-Version;
    more_clear_headers X-AspNetMvc-Version;
    more_clear_headers X-Runtime;
    more_clear_headers X-Version;
    more_clear_headers X-Generator;
    more_clear_headers X-Drupal-Cache;
    more_clear_headers X-Varnish;
    more_clear_headers Via;
    more_clear_headers X-Turbo-Charged-By;
    more_clear_headers X-Pingback;
    more_clear_headers X-Served-By;
    more_clear_headers X-Cache;
    more_clear_headers X-Cache-Status;
    more_clear_headers X-Mod-Pagespeed;
    more_clear_headers X-Page-Speed;
    
    # Set fake server header to masquerade as Apache
    more_set_headers "Server: Apache/2.4.41 (Ubuntu)";
    more_set_headers "X-Powered-By: PHP/8.1.2";
    
    # Remove nginx error page signatures and use custom pages
    error_page 400 401 402 403 404 405 406 407 408 409 410 411 412 413 414 415 416 417 418 421 422 423 424 425 426 428 429 431 451 /custom_error.html;
    
    # Security headers (without revealing nginx)
    more_set_headers "X-Frame-Options: SAMEORIGIN";
    more_set_headers "X-Content-Type-Options: nosniff";
    more_set_headers "X-XSS-Protection: 1; mode=block";
    more_set_headers "Referrer-Policy: strict-origin-when-cross-origin";
    more_set_headers "Content-Security-Policy: default-src 'self'; script-src 'self' 'unsafe-inline' 'unsafe-eval'; style-src 'self' 'unsafe-inline'; img-src 'self' data: https:; font-src 'self' data:; connect-src 'self'; frame-ancestors 'self';";
    more_set_headers "Permissions-Policy: geolocation=(), microphone=(), camera=()";
    more_set_headers "X-Robots-Tag: noindex, nofollow, nosnippet, noarchive";
    
    # Hide all potentially revealing headers from upstream
    fastcgi_hide_header X-Powered-By;
    fastcgi_hide_header Server;
    fastcgi_hide_header X-Runtime;
    fastcgi_hide_header X-Version;
    proxy_hide_header X-Powered-By;
    proxy_hide_header Server;
    proxy_hide_header X-Runtime;
    proxy_hide_header X-Version;
    proxy_hide_header X-Generator;
    proxy_hide_header Via;
    proxy_hide_header X-Varnish;
    proxy_hide_header X-Cache;
    proxy_hide_header X-Cache-Status;
    
    # Performance optimizations
    sendfile on;
    tcp_nopush on;
    tcp_nodelay on;
    keepalive_timeout 65;
    keepalive_requests 1000;
    types_hash_max_size 2048;
    client_max_body_size 100M;
    client_body_timeout 12;
    client_header_timeout 12;
    send_timeout 10;
    
    # Buffer optimizations
    client_body_buffer_size 128k;
    client_header_buffer_size 1k;
    large_client_header_buffers 4 4k;
    output_buffers 1 32k;
    postpone_output 1460;
    
    # Gzip compression
    gzip on;
    gzip_vary on;
    gzip_min_length 1024;
    gzip_proxied any;
    gzip_comp_level 6;
    gzip_types
        text/plain
        text/css
        text/xml
        text/javascript
        application/json
        application/javascript
        application/xml+rss
        application/atom+xml
        image/svg+xml;

    # Rate limiting and DDoS protection
    limit_req_zone $binary_remote_addr zone=api:10m rate=10r/s;
    limit_req_zone $binary_remote_addr zone=login:10m rate=5r/m;
    limit_req_zone $binary_remote_addr zone=global:10m rate=30r/m;
    limit_conn_zone $binary_remote_addr zone=conn_limit_per_ip:10m;
    
    # Request size limits
    client_body_buffer_size 1K;
    client_header_buffer_size 1k;
    large_client_header_buffers 2 1k;
    
    # Log format without server identification
    log_format main '$remote_addr - $remote_user [$time_local] "$request" '
                    '$status $body_bytes_sent "$http_referer" '
                    '"$http_user_agent" "$http_x_forwarded_for"';
    
    access_log /var/log/nginx/access.log main;

    # Frontend server block
    server {
        listen 80;
        listen [::]:80;
        server_name _;
        
        # Redirect HTTP to HTTPS
        return 301 https://$server_name$request_uri;
    }

    # Main HTTPS server block
    server {
        listen 443 ssl http2;
        listen [::]:443 ssl http2;
        server_name _;
        
        # SSL Configuration (hardened for security and stealth)
        ssl_certificate /etc/ssl/certs/nginx-selfsigned.crt;
        ssl_certificate_key /etc/ssl/private/nginx-selfsigned.key;
        ssl_protocols TLSv1.2 TLSv1.3;
        ssl_ciphers ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256:ECDHE-ECDSA-AES256-GCM-SHA384:ECDHE-RSA-AES256-GCM-SHA384:ECDHE-ECDSA-CHACHA20-POLY1305:ECDHE-RSA-CHACHA20-POLY1305:DHE-RSA-AES128-GCM-SHA256:DHE-RSA-AES256-GCM-SHA384;
        ssl_prefer_server_ciphers off;
        ssl_session_cache shared:TLS:2m;
        ssl_session_timeout 1h;
        ssl_session_tickets off;
        
        # SSL security enhancements
        ssl_stapling on;
        ssl_stapling_verify on;
        ssl_buffer_size 8k;
        
        # Diffie-Hellman parameter for DHE ciphersuites
        ssl_dhparam /etc/ssl/certs/dhparam.pem;
        
        # HSTS and additional security headers
        more_set_headers "Strict-Transport-Security: max-age=31536000; includeSubDomains; preload";
        more_set_headers "Expect-CT: max-age=86400, enforce";
        
        # Custom error page to hide nginx signatures
        error_page 404 /custom_404.html;
        error_page 500 502 503 504 /custom_50x.html;
        
        location = /custom_404.html {
            root /usr/share/nginx/html;
            internal;
        }
        
        location = /custom_50x.html {
            root /usr/share/nginx/html;
            internal;
        }
        
        # Global rate limiting
        limit_req zone=global burst=50 nodelay;
        limit_conn conn_limit_per_ip 20;
        
        # Frontend static files
        location / {
            root /usr/share/nginx/html;
            index index.html index.htm;
            try_files $uri $uri/ /index.html;
            
            # Security headers for static content
            more_set_headers "X-Content-Type-Options: nosniff";
            more_set_headers "X-Frame-Options: DENY";
            
            # Cache static assets
            location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|woff|woff2|ttf|eot)$ {
                expires 1y;
                more_set_headers "Cache-Control: public, immutable";
                more_set_headers "Pragma: public";
                access_log off;
            }
        }
        
        # API proxy to backend
        location /api/ {
            limit_req zone=api burst=20 nodelay;
            
            proxy_pass http://backend:3000/;
            proxy_http_version 1.1;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection 'upgrade';
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_cache_bypass $http_upgrade;
            
            # Hide all backend server headers
            proxy_hide_header Server;
            proxy_hide_header X-Powered-By;
            proxy_hide_header X-Runtime;
            proxy_hide_header X-Version;
            proxy_hide_header X-Generator;
            proxy_hide_header Via;
            
            # Add fake headers to mask backend technology
            more_set_headers "X-Powered-By: PHP/8.1.2";
        }
        
        # Login rate limiting
        location /api/auth/login {
            limit_req zone=login burst=3 nodelay;
            
            proxy_pass http://backend:3000/auth/login;
            proxy_http_version 1.1;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            
            # Hide all backend server headers
            proxy_hide_header Server;
            proxy_hide_header X-Powered-By;
            proxy_hide_header X-Runtime;
            proxy_hide_header X-Version;
            proxy_hide_header X-Generator;
            proxy_hide_header Via;
            
            # Add fake headers to mask backend technology
            more_set_headers "X-Powered-By: PHP/8.1.2";
        }
        
        # Security: Block access to sensitive files and directories
        location ~ /\. {
            deny all;
            access_log off;
            log_not_found off;
            return 404;
        }
        
        location ~ \.(env|git|svn|htaccess|htpasswd|ini|log|sh|sql|tar|gz)$ {
            deny all;
            access_log off;
            log_not_found off;
            return 404;
        }
        
        # Block common vulnerability scanners
        location ~* (wp-admin|wp-login|xmlrpc|phpmyadmin|admin|administrator|manager) {
            deny all;
            access_log off;
            log_not_found off;
            return 404;
        }
        
        # Block common exploit attempts
        location ~* \.(aspx|jsp|cgi)$ {
            deny all;
            access_log off;
            log_not_found off;
            return 404;
        }
        
        # Health check endpoint (internal only)
        location /nginx-health {
            access_log off;
            return 200 "healthy\n";
            more_set_headers "Content-Type: text/plain";
            allow 127.0.0.1;
            allow ::1;
            deny all;
        }
    }
}
