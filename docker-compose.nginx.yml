version: '3.8'

services:
  nginx:
    build:
      context: .
      dockerfile: nginx/Dockerfile.stealth
    container_name: painelconsulta_nginx_stealth
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx.conf:/etc/nginx/nginx.conf:ro
      - ./frontend/dist:/usr/share/nginx/html:ro
      - ./nginx/ssl:/etc/ssl:ro
      - ./nginx/custom-pages:/usr/share/nginx/html/error-pages:ro
    depends_on:
      - backend
      - frontend
    networks:
      - painelconsulta_network
    restart: unless-stopped
    
    # Additional stealth and security measures
    security_opt:
      - no-new-privileges:true
    read_only: true
    tmpfs:
      - /var/cache/nginx:noexec,nosuid,size=100m
      - /var/run:noexec,nosuid,size=100m
      - /tmp:noexec,nosuid,size=100m
    
    # Resource limits
    deploy:
      resources:
        limits:
          memory: 512M
          cpus: '0.5'
        reservations:
          memory: 256M
          cpus: '0.25'
    
    # Health check
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost/nginx-health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s

  backend:
    build: ./backend
    container_name: painelconsulta_backend
    environment:
      - NODE_ENV=production
    networks:
      - painelconsulta_network
    restart: unless-stopped

  frontend:
    build: ./frontend
    container_name: painelconsulta_frontend
    networks:
      - painelconsulta_network
    restart: unless-stopped

networks:
  painelconsulta_network:
    driver: bridge
